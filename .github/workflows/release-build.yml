# Test build for a release candidate. Pushing a release/<version> branch (cut
# from devel after the static-analysis gate passes) builds the app on Linux and
# Windows, runs the tests, packages a self-contained AppImage / a windeployqt
# zip, and uploads them as artifacts to validate before tagging on main.
name: release-build

on:
  push:
    branches: ['release/**']
  workflow_dispatch: {} # allow manual test runs on any branch

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    env:
      QT_QPA_PLATFORM: offscreen
      APPIMAGE_EXTRACT_AND_RUN: 1 # GitHub runners have no FUSE
      NO_STRIP: 1                 # avoid linuxdeploy's strip on .relr.dyn libs
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 ninja-build wget file

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.1
          cache: true

      - name: Configure (Release)
        env:
          CC: gcc-14
          CXX: g++-14
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Tests
        run: ctest --test-dir build --output-on-failure

      - name: Derive version
        id: ver
        run: |
          v="${GITHUB_REF_NAME#release/}"
          case "$v" in */*|"") v="snapshot";; esac
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build AppImage
        env:
          QMAKE: ${{ env.QT_ROOT_DIR }}/bin/qmake
          OUTPUT: amule-remote-qt-${{ steps.ver.outputs.version }}-x86_64.AppImage
        run: |
          cmake --install build --prefix "$PWD/AppDir/usr"
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage

      - name: Smoke-test AppImage
        run: |
          chmod +x amule-remote-qt-*-x86_64.AppImage
          ./amule-remote-qt-*-x86_64.AppImage --selftest

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: amule-remote-qt-${{ steps.ver.outputs.version }}-AppImage
          path: amule-remote-qt-*-x86_64.AppImage
          retention-days: 14

  windows:
    runs-on: windows-2022
    env:
      QT_QPA_PLATFORM: offscreen
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja -y

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.1
          arch: win64_msvc2022_64
          cache: true

      - name: Configure (Release)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Tests
        run: ctest --test-dir build --output-on-failure

      - name: Deploy Qt runtime
        run: |
          mkdir -p dist
          cp build/app/amule-remote-qt.exe dist/
          "$QT_ROOT_DIR/bin/windeployqt.exe" --release --compiler-runtime dist/amule-remote-qt.exe

      - name: Package zip
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^release/',''
          if ($v -match '/' -or $v -eq '') { $v = 'snapshot' }
          Compress-Archive -Path dist/* -DestinationPath "amule-remote-qt-$v-windows-x64.zip" -Force

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: amule-remote-qt-windows-x64
          path: amule-remote-qt-*-windows-x64.zip
          retention-days: 14
