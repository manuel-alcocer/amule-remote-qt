# Final release. After a release/<version> build is validated and merged to
# main, pushing the matching tag (e.g. v0.1.0) builds the release binary and
# publishes a GitHub Release with it attached.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-24.04
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 ninja-build

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.1
          cache: true

      - name: Configure (Release)
        env:
          CC: gcc-14
          CXX: g++-14
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Tests
        run: ctest --test-dir build --output-on-failure

      - name: Package binary
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp build/app/amule-remote-qt dist/
          tar -C dist -czf "amule-remote-qt-${version}-linux-x86_64.tar.gz" .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: amule-remote-qt-*-linux-x86_64.tar.gz
