# Final release. After a release/<version> build is validated and merged to
# main, pushing the matching tag (e.g. v0.1.0) builds the Linux AppImage and the
# Windows zip, smoke-tests the AppImage, and publishes a GitHub Release with both
# attached.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  linux:
    runs-on: ubuntu-24.04
    # Final releases only; release-candidate (-RC.N) tags are handled by
    # release-build.
    if: ${{ !contains(github.ref_name, '-RC') }}
    env:
      QT_QPA_PLATFORM: offscreen
      APPIMAGE_EXTRACT_AND_RUN: 1
      NO_STRIP: 1
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 ninja-build wget file
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.1
          cache: true
      - name: Configure (Release)
        env:
          CC: gcc-14
          CXX: g++-14
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build
      - name: Tests
        run: ctest --test-dir build --output-on-failure
      - name: Build AppImage
        env:
          QMAKE: ${{ env.QT_ROOT_DIR }}/bin/qmake
          OUTPUT: amule-remote-qt-${{ github.ref_name }}-x86_64.AppImage
        run: |
          cmake --install build --prefix "$PWD/AppDir/usr"
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage
      - name: Smoke-test AppImage
        run: |
          chmod +x amule-remote-qt-*-x86_64.AppImage
          ./amule-remote-qt-*-x86_64.AppImage --selftest
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: amule-remote-qt-*-x86_64.AppImage

  windows:
    runs-on: windows-2022
    if: ${{ !contains(github.ref_name, '-RC') }}
    env:
      QT_QPA_PLATFORM: offscreen
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Install Ninja
        run: choco install ninja -y
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.1
          arch: win64_msvc2022_64
          cache: true
      - name: Configure (Release)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build
      - name: Tests
        run: ctest --test-dir build --output-on-failure
      - name: Deploy Qt runtime
        run: |
          mkdir -p dist
          cp build/app/amule-remote-qt.exe dist/
          "$QT_ROOT_DIR/bin/windeployqt.exe" --release --compiler-runtime dist/amule-remote-qt.exe
      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist/* -DestinationPath "amule-remote-qt-${{ github.ref_name }}-windows-x64.zip" -Force
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: amule-remote-qt-*-windows-x64.zip

  publish:
    needs: [linux, windows]
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: assets/*
