# Final release. After a release/<version> build is validated and merged to
# main, pushing the matching tag (e.g. v0.1.0) builds the self-contained
# AppImage, smoke-tests it and publishes a GitHub Release with it attached.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-24.04
    env:
      QT_QPA_PLATFORM: offscreen
      APPIMAGE_EXTRACT_AND_RUN: 1
      NO_STRIP: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 ninja-build wget file

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.1
          cache: true

      - name: Configure (Release)
        env:
          CC: gcc-14
          CXX: g++-14
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Tests
        run: ctest --test-dir build --output-on-failure

      - name: Build AppImage
        env:
          QMAKE: ${{ env.QT_ROOT_DIR }}/bin/qmake
          OUTPUT: amule-remote-qt-${{ github.ref_name }}-x86_64.AppImage
        run: |
          cmake --install build --prefix "$PWD/AppDir/usr"
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage

      - name: Smoke-test AppImage
        run: |
          chmod +x amule-remote-qt-*-x86_64.AppImage
          ./amule-remote-qt-*-x86_64.AppImage --selftest

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: amule-remote-qt-*-x86_64.AppImage
